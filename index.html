<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rakib Admin Login</title>

<style>

body{

background:#000;

display:flex;

justify-content:center;
align-items:center;

height:100vh;

font-family:Arial;

}

.box{

background:#111;

padding:30px;

border-radius:20px;

width:300px;

text-align:center;

box-shadow:
0 0 20px red;

}

h1{

color:red;

margin-bottom:20px;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:10px;

background:#222;

color:white;

font-size:16px;

}

button{

width:100%;

padding:12px;

background:red;

border:none;

border-radius:10px;

font-size:18px;

color:white;

font-weight:bold;

margin-top:10px;

cursor:pointer;

}

.error{

color:red;

margin-top:10px;

}

</style>

</head>

<body>

<div class="box">

<h1>🔒 Admin Login</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

LOGIN

</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

const user =
document.getElementById('username').value;

const pass =
document.getElementById('password').value;

if(
user==="rakib"
&&
pass==="12345"
){

localStorage.setItem(
"rakib_admin",
"logged"
);

window.location.href=
"dashboard.html";

}
else{

document.getElementById('error')
.innerText=
"Wrong Username or Password";

}

}

</script>

</body>
</html>
